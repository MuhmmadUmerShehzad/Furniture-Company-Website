<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Pine Valley Furniture</title>
    <meta name="description" content="Login to your Pine Valley Furniture account to browse and order furniture.">
    <link rel="stylesheet" href="stylesheet.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 16px;
            min-height: calc(100vh - 130px);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-lg);
            padding: 44px 40px;
            box-shadow: var(--shadow-lg);
        }

        .login-card .page-label {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-card .form-group {
            margin-bottom: 20px;
        }

        .login-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .login-actions button {
            width: 100%;
            text-align: center;
            padding: 12px;
        }

        .login-card .help {
            display: block;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1 class="site-title">Pine Valley Furniture</h1>

    <nav class="navbar">
        <ul>
            <li><a href="login.html" class="active">Login</a></li>
            <li><a href="registration.html">Registration</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="Catalog.html">Catalog</a></li>
            <li><a href="Order.html">Order</a></li>
            <li><a href="payment.html">Payment</a></li>
            <li><a href="helpPage.html">Help</a></li>
        </ul>
    </nav>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="page-label">Welcome Back</div>

            <div class="form-group">
                <input type="text" id="fullName" placeholder="Full Name">
                <input type="password" id="password" placeholder="Password">
            </div>

            <div class="login-actions">
                <button id="loginBtn">Login</button>
                <button id="registerBtn" class="btn-secondary" onclick="window.location.href='registration.html'">Create an Account</button>
            </div>

            <a href="helpPage.html" class="help">Need help?</a>
        </div>
    </div>

</body>

</html>
